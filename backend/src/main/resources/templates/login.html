<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>로그인</title>
    <style>
        body{font-family:sans-serif;max-width:380px;margin:80px auto;}
        input{display:block;width:100%;padding:8px;margin:6px 0;}
        button{padding:8px 16px;cursor:pointer;}
        .oauth a{display:inline-block;margin:4px 0;padding:8px 12px;
                 background:#eee;color:#000;text-decoration:none;border-radius:4px;}
        .err{color:red;}
    </style>
</head>
<body>
<h2>로그인</h2>
<input id="email"    placeholder="이메일"/>
<input id="password" type="password" placeholder="비밀번호"/>
<button onclick="login()">로그인</button>
<a href="/signup">회원가입</a>
<p id="err" class="err"></p>

<hr/>
<div class="oauth">
    <a href="/oauth2/authorization/kakao">카카오로 로그인</a>
    <a href="/oauth2/authorization/naver">네이버로 로그인</a>
    <a href="/oauth2/authorization/google">구글로 로그인</a>
</div>

<script>
async function login() {
    const email    = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        credentials: 'include',
        body: JSON.stringify({email, password})
    });
    const json = await res.json();
    if (json.success) {
        sessionStorage.setItem('accessToken', json.data.accessToken);
        location.href = '/todos';
    } else {
        document.getElementById('err').textContent = json.message;
    }
}
</script>
</body>
</html>
