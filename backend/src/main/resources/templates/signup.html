<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>회원가입</title>
<style>body{font-family:sans-serif;max-width:380px;margin:80px auto;}
input{display:block;width:100%;padding:8px;margin:6px 0;}
.err{color:red;}</style></head>
<body>
<h2>회원가입</h2>
<input id="email"    placeholder="이메일"/>
<input id="password" type="password" placeholder="비밀번호 (영문+숫자, 8자 이상)"/>
<input id="nickname" placeholder="닉네임"/>
<button onclick="signup()">가입</button>
<p id="msg"></p>

<script>
async function signup() {
    const body = {
        email:    document.getElementById('email').value,
        password: document.getElementById('password').value,
        nickname: document.getElementById('nickname').value
    };
    const res = await fetch('/api/auth/sign-up', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(body)
    });
    const json = await res.json();
    document.getElementById('msg').textContent = json.message
        + (json.data && json.data.password ? ' / ' + json.data.password : '');
    if (json.success) location.href = '/login';
}
</script>
</body>
</html>
