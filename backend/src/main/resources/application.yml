spring:
  application:
    name: todo-platform

  datasource:
    url: jdbc:mysql://localhost:3306/todoapp?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: todo
    password: todo1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 5000

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:dummy}
            client-secret: ${KAKAO_CLIENT_SECRET:dummy}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: profile_nickname, account_email
            client-name: Kakao
          naver:
            client-id: ${NAVER_CLIENT_ID:dummy}
            client-secret: ${NAVER_CLIENT_SECRET:dummy}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: name, email
            client-name: Naver
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy}
            scope:
              - email
              - profile
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.todo.backend
  configuration:
    map-underscore-to-camel-case: true   # user_id ↔ userId 자동 매핑
    cache-enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:my-very-long-secret-key-for-todo-app-do-not-use-in-prod-please-change-me}
    access-expiration-minutes: 30
    refresh-expiration-days: 14

logging:
  level:
    root: INFO
    com.todo.backend: DEBUG
    org.mybatis: DEBUG
    jdbc.sqlonly: DEBUG

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true